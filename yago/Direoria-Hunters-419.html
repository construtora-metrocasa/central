<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yago</title>
<link rel="icon" href="icon.png" type="image/png">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Mensagem de boas-vindas */
#bemVindo {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    background: rgba(255,255,255,0.9);
    padding: 10px 18px;
    border-radius: 8px;
    color: #333;
    font-size: 1.1em;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 1s;
}

/* Container do carrossel */
#carouselContainer {
    position: fixed;
    inset: 0;
    z-index: 1;
}

/* Iframes */
.carouselFrame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    opacity: 0;
    transition: opacity 0.6s ease;
}

.carouselFrame.active {
    opacity: 1;
    z-index: 2;
}

/* Botões */
.carouselBtn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9999;

    background: rgba(0,0,0,0.12);
    color: white;
    border: none;

    font-size: 18px;
    padding: 8px 12px;
    border-radius: 50%;
    cursor: pointer;

    backdrop-filter: blur(4px);

    opacity: 0;
    transition: opacity 0.4s ease, background 0.3s ease;
}

#prevBtn { left: 12px; }
#nextBtn { right: 12px; }

.carouselBtn:hover {
    background: rgba(0,0,0,0.35);
}

/* aparecem quando mover o mouse */
.showControls .carouselBtn {
    opacity: 1;
}
</style>
</head>

<body>

<h2 id="bemVindo"></h2>

<div id="carouselContainer">
    <iframe class="carouselFrame active" 
        src="https://app.powerbi.com/view?r=eyJrIjoiMjhkZjg2YjAtYWVhMy00MzVlLWFiY2EtZDg5ZWJhOTcwNjkyIiwidCI6ImM3NGViY2JkLWE4MGYtNDYwYy1hMDUzLTEwZDViNmY1ZWQwNSJ9">
    </iframe>

    <iframe class="carouselFrame" 
        src="https://app.powerbi.com/view?r=eyJrIjoiODM5YjE5MTctOTU1Ny00MDJkLWEyMjMtMGUyN2MwMmIyODJkIiwidCI6ImM3NGViY2JkLWE4MGYtNDYwYy1hMDUzLTEwZDViNmY1ZWQwNSJ9">
    </iframe>
</div>

<button id="prevBtn" class="carouselBtn">❮</button>
<button id="nextBtn" class="carouselBtn">❯</button>

<script>
// ---------------- Cookie ----------------
function getCookie(nome) {
    const match = document.cookie.match(new RegExp('(^| )' + nome + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : null;
}

// ---------------- Registro no Google Sheets ----------------
async function registrarAcesso(usuario) {
    const apiUrl = "https://script.google.com/macros/s/AKfycbw8L0ZxkZxQ6E7BuqNPJDlr_xZTBVP12I8duKiU-Us1bS5slw7UJp_obNTrv2KuAuo/exec";
    const dispositivo = navigator.userAgent;
    const horario = new Date().toISOString();
    const link = window.location.href;

    let ip = "";
    try {
        const r = await fetch("https://api.ipify.org?format=json");
        ip = (await r.json()).ip;
    } catch(e){}

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, link, horario, dispositivo, ip })
    });
}

// ---------------- Solicitar nome ----------------
function solicitarNomeERegistrar() {
    const usuario = prompt("Digite seu nome para acessar:") || "Desconhecido";
    document.cookie = `usuario=${encodeURIComponent(usuario)}; path=/; max-age=${60*60*24*365}; SameSite=Lax`;
    registrarAcesso(usuario);
    return usuario;
}

// ---------------- Carrossel ----------------
const frames = document.querySelectorAll(".carouselFrame");
let index = 0;

document.getElementById("nextBtn").onclick = () => {
    frames[index].classList.remove("active");
    index = (index + 1) % frames.length;
    frames[index].classList.add("active");
};

document.getElementById("prevBtn").onclick = () => {
    frames[index].classList.remove("active");
    index = (index - 1 + frames.length) % frames.length;
    frames[index].classList.add("active");
};

// ---------------- Mostrar botões só quando mover mouse ----------------
let hideTimeout;
document.addEventListener("mousemove", () => {
    document.body.classList.add("showControls");

    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
        document.body.classList.remove("showControls");
    }, 2500);
});

// ---------------- Carregamento ----------------
window.onload = function() {
    let usuario = getCookie("usuario");
    const bemVindo = document.getElementById("bemVindo");

    if(usuario){
        bemVindo.innerText = `Bem-vindo de volta, ${usuario}!`;
        registrarAcesso(usuario);
    } else {
        usuario = solicitarNomeERegistrar();
        bemVindo.innerText = `Bem-vindo, ${usuario}!`;
    }

    bemVindo.style.opacity = "1";
    setTimeout(() => {
        bemVindo.style.opacity = "0";
    }, 3000);
};
</script>

</body>
</html>
